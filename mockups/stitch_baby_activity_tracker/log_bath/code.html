<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tap-target {
            min-height: 56px;
        }
        body {
            background-color: #f7faf5;
            overscroll-behavior: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-md text-on-surface">
<!-- TopAppBar Shell -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 h-16 bg-[#FFFDF5] dark:bg-stone-900 border-none transition-all">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors Active: scale-95 duration-200">
<span class="material-symbols-outlined text-[#6B8E6B] dark:text-[#8EAD8E]">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-semibold text-lg tracking-tight text-[#6B8E6B] dark:text-[#8EAD8E]">Log Bath</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="pt-24 pb-32 px-container-margin max-w-md mx-auto">
<!-- Hero Visual Section -->
<div class="flex flex-col items-center justify-center mb-stack-lg">
<div class="w-40 h-40 rounded-full bg-primary-fixed flex items-center justify-center shadow-lg mb-stack-md">
<span class="material-symbols-outlined text-[80px] text-primary" data-icon="bathtub">bathtub</span>
</div>
<p class="font-headline-md text-headline-md text-on-surface text-center">Fresh &amp; Clean</p>
<p class="font-body-md text-label-md text-outline text-center">Log baby's bath time routine</p>
</div>
<!-- Input Section -->
<div class="space-y-stack-md">
<!-- Time Selector -->
<div class="bg-surface-container-low p-stack-md rounded-lg shadow-sm border border-outline-variant/30">
<label class="block font-label-md text-on-surface-variant mb-unit">Bath Time</label>
<div class="flex items-center gap-stack-sm bg-white p-3 rounded-DEFAULT border border-outline-variant">
<span class="material-symbols-outlined text-primary" data-icon="schedule">schedule</span>
<span class="font-body-lg text-on-surface flex-grow">Just now</span>
<span class="material-symbols-outlined text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Notes Field -->
<div class="bg-surface-container-low p-stack-md rounded-lg shadow-sm border border-outline-variant/30">
<label class="block font-label-md text-on-surface-variant mb-unit">Notes (Optional)</label>
<textarea class="w-full bg-white p-4 rounded-DEFAULT border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary font-body-md text-on-surface placeholder:text-outline/60 resize-none h-32" placeholder="e.g., Used lavender soap, baby enjoyed the bubbles"></textarea>
</div>
<!-- Quick Tags (Soft UI Style) -->
<div class="flex flex-wrap gap-2 pt-2">
<button class="px-4 h-10 rounded-full border border-primary text-primary font-label-md hover:bg-primary-fixed transition-colors">Warm water</button>
<button class="px-4 h-10 rounded-full border border-primary text-primary font-label-md hover:bg-primary-fixed transition-colors">Lavender</button>
<button class="px-4 h-10 rounded-full border border-primary text-primary font-label-md hover:bg-primary-fixed transition-colors">Lotion applied</button>
</div>
</div>
<!-- Call to Action -->
<div class="mt-stack-lg">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-label-xl rounded-lg shadow-md flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                Save Bath Log
            </button>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-24 pb-safe bg-[#FFFDF5]/80 dark:bg-stone-900/80 backdrop-blur-xl rounded-t-[32px] shadow-[0_-4px_24px_rgba(107,142,107,0.08)]">
<!-- History -->
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 hover:opacity-80 transition-transform duration-300 tap-highlight-none" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium">History</span>
</a>
<!-- Insights -->
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 hover:opacity-80 transition-transform duration-300 tap-highlight-none" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium">Insights</span>
</a>
<!-- FAB Central (Active Context: Log) -->
<a class="flex flex-col items-center justify-center text-[#6B8E6B] dark:text-[#8EAD8E] font-bold scale-110 transition-transform duration-300 tap-highlight-none" href="#">
<div class="bg-[#6B8E6B] text-white p-3 rounded-full shadow-lg mb-1">
<span class="material-symbols-outlined" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</div>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-bold">Log</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 hover:opacity-80 transition-transform duration-300 tap-highlight-none" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium">Settings</span>
</a>
</nav>

</div>
