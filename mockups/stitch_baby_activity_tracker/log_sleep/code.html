        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tap-highlight-transparent {
            -webkit-tap-highlight-color: transparent;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container min-h-screen pb-32">
<!-- Top App Bar -->
<header class="bg-[#FFFDF5] dark:bg-stone-900 shadow-sm dark:shadow-none docked full-width top-0 sticky flex justify-between items-center w-full px-6 py-4 z-50">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-stone-100 transition-all">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#6B8E6B] dark:text-[#8BAB8B]">Log Sleep</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#6B8E6B] dark:text-[#8BAB8B]">notifications</span>
</div>
</header>
<main class="px-gutter pt-stack-lg max-w-lg mx-auto">
<!-- Duration Display -->
<section class="flex flex-col items-center justify-center py-stack-lg text-center">
<div class="relative w-48 h-48 flex items-center justify-center rounded-full bg-secondary-container/30 border-4 border-secondary-container/50 shadow-inner">
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary scale-[4] opacity-10">bedtime</span>
</div>
<div class="z-10">
<p class="font-label-md text-on-secondary-container mb-1">Duration</p>
<p class="font-headline-lg text-secondary text-[48px]">2h 15m</p>
</div>
</div>
<p class="mt-stack-md font-body-md text-on-surface-variant opacity-80">Currently resting since 2:30 PM</p>
</section>
<!-- Primary Action Button -->
<section class="mb-stack-lg">
<button class="w-full h-touch-target-min bg-secondary text-white rounded-lg font-label-xl shadow-lg shadow-secondary/20 flex items-center justify-center gap-2 tap-highlight-transparent active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined">stop_circle</span>
                End Sleep
            </button>
</section>
<!-- Manual Entry Section -->
<section class="bg-surface-container-low rounded-lg p-stack-md border border-outline-variant/30 space-y-gutter">
<h2 class="font-headline-md text-on-surface mb-stack-sm">Manual Entry</h2>
<div class="grid grid-cols-2 gap-stack-md">
<div class="flex flex-col space-y-1">
<label class="font-label-md text-on-surface-variant ml-2">Start Time</label>
<div class="relative">
<input class="w-full h-touch-target-min px-4 bg-surface-container-highest rounded-lg border-none focus:ring-2 focus:ring-primary font-body-lg text-on-surface" type="time" value="14:30"/>
</div>
</div>
<div class="flex flex-col space-y-1">
<label class="font-label-md text-on-surface-variant ml-2">End Time</label>
<div class="relative">
<input class="w-full h-touch-target-min px-4 bg-surface-container-highest rounded-lg border-none focus:ring-2 focus:ring-primary font-body-lg text-on-surface" type="time" value="16:45"/>
</div>
</div>
</div>
<div class="flex flex-col space-y-1">
<label class="font-label-md text-on-surface-variant ml-2">Notes</label>
<textarea class="w-full p-4 bg-surface-container-highest rounded-lg border-none focus:ring-2 focus:ring-primary font-body-md text-on-surface resize-none" placeholder="e.g. Baby woke up once, very calm" rows="3"></textarea>
</div>
</section>
<!-- Visual Context Card -->
<section class="mt-stack-lg overflow-hidden rounded-lg relative h-40">
<img class="w-full h-full object-cover" data-alt="A serene nursery setting with a baby monitor displaying a sleeping infant in a dimly lit room. The atmosphere is peaceful and calm, using a soft sage and lavender color palette. Soft, warm ambient light filters through sheer curtains, creating a nurturing and safe environment that reflects the brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDT9ZV9Tg89G-xpRWjyOnsXAEk46fYthRajIS-e4kTJh6ahYJHsyVam-osCxbic3DHhmYJGr8r-0co3pWAG6EUzVyf45WUQZUI8JynvZgEj09owzW9e_hBjLBeGIq6RWazMUQBppRe1SFjqLfLJLmbTHc8JEXvlL61xwe6vwtaVz7HFKvOy13jfuHOkHumCg7g7YJ6FlurB_C4f8_9uP68oldwBcgaip1YnF_PCnlGNXetANEvHEZdBAc1qSZB0TA4HP78tC3kQB-kW"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-gutter">
<p class="text-white font-label-md flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">info</span>
                    Consistency helps baby develop routines
                </p>
</div>
</section>
</main>
<!-- Fixed Footer Action -->
<div class="fixed bottom-0 left-0 w-full p-container-margin z-50 bg-gradient-to-t from-background via-background/95 to-transparent">
<button class="w-full h-touch-target-min bg-primary text-on-primary rounded-lg font-label-xl shadow-xl shadow-primary/20 flex items-center justify-center gap-2 tap-highlight-transparent active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined">save</span>
            Save Record
        </button>
</div>
<!-- Hidden Navigation Triggered only on Home/Root -->
<!-- (Suppressed for this sub-page according to Task-Focused Rule) -->
</body></html>
