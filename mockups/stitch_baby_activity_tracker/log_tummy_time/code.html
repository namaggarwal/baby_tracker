<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lexend:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#436444",
                    "on-background": "#191c1a",
                    "inverse-surface": "#2d312e",
                    "error": "#ba1a1a",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed-variant": "#494265",
                    "secondary-container": "#dfd4ff",
                    "surface": "#f7faf5",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#f7fff2",
                    "on-primary-fixed-variant": "#2e4e30",
                    "primary-container": "#5b7d5b",
                    "outline": "#737970",
                    "inverse-on-surface": "#eff2ed",
                    "surface-container-high": "#e6e9e4",
                    "secondary": "#61597e",
                    "surface-container": "#ecefea",
                    "surface-variant": "#e0e3df",
                    "on-tertiary-fixed-variant": "#484741",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#fffbff",
                    "tertiary-fixed-dim": "#c9c6be",
                    "outline-variant": "#c2c8be",
                    "on-primary-fixed": "#012108",
                    "tertiary-fixed": "#e6e2d9",
                    "primary-fixed": "#c6edc4",
                    "on-surface-variant": "#424841",
                    "on-surface": "#191c1a",
                    "surface-tint": "#456646",
                    "surface-dim": "#d8dbd6",
                    "secondary-fixed": "#e7deff",
                    "primary-fixed-dim": "#abd0a9",
                    "on-error": "#ffffff",
                    "surface-container-low": "#f1f4f0",
                    "tertiary-container": "#76746d",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#1d1637",
                    "on-tertiary-fixed": "#1c1c17",
                    "surface-bright": "#f7faf5",
                    "on-error-container": "#93000a",
                    "on-secondary-container": "#625a7f",
                    "secondary-fixed-dim": "#cbc1eb",
                    "inverse-primary": "#abd0a9",
                    "tertiary": "#5d5c55",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#e0e3df",
                    "background": "#f7faf5"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-margin": "24px",
                    "gutter": "16px",
                    "unit": "8px",
                    "stack-sm": "8px",
                    "touch-target-min": "56px",
                    "stack-md": "16px",
                    "stack-lg": "32px"
            },
            "fontFamily": {
                    "body-lg": ["Lexend"],
                    "body-md": ["Lexend"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "label-xl": ["Lexend"],
                    "label-md": ["Lexend"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-xl": ["20px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .timer-glow {
            box-shadow: 0 0 60px -15px rgba(67, 100, 68, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- Top App Bar -->
<header class="bg-[#FCF9F2] dark:bg-slate-950 border-b border-[#6B8E6B]/10 dark:border-white/5 flex justify-between items-center w-full px-6 py-4 max-w-lg mx-auto sticky top-0 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#6B8E6B] dark:text-[#8BAB8B]" data-icon="child_care">child_care</span>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-lg text-[#6B8E6B] dark:text-[#8BAB8B]">LittleSteps</h1>
</div>
<button class="hover:bg-[#6B8E6B]/5 dark:hover:bg-white/5 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500" data-icon="account_circle">account_circle</span>
</button>
</header>
<main class="max-w-lg mx-auto px-container-margin pt-stack-lg flex flex-col gap-stack-lg">
<!-- Screen Title -->
<div class="space-y-unit">
<h2 class="font-headline-lg text-headline-lg text-on-background">Tummy Time</h2>
<p class="font-body-md text-on-surface-variant">Strengthening muscles, one minute at a time.</p>
</div>
<!-- Central Timer Section -->
<section class="flex flex-col items-center gap-stack-lg">
<div class="relative w-72 h-72 flex items-center justify-center">
<!-- Outer Progress Circle -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-surface-container-high" cx="144" cy="144" fill="transparent" r="130" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-primary-container" cx="144" cy="144" fill="transparent" r="130" stroke="currentColor" stroke-dasharray="816" stroke-dashoffset="408" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<!-- Timer Display -->
<div class="bg-surface-container-lowest w-60 h-60 rounded-full flex flex-col items-center justify-center timer-glow border-4 border-surface-container">
<span class="font-headline-lg text-[48px] text-primary tracking-tighter leading-none">00:00:00</span>
<span class="font-label-md text-on-surface-variant mt-2">Active Session</span>
</div>
</div>
<!-- Start/Stop Action -->
<button class="w-full h-touch-target-min bg-primary text-on-primary rounded-xl font-headline-md text-headline-md flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                Start Session
            </button>
</section>
<!-- Daily Goal Tracker -->
<section class="bg-surface-container-low p-stack-md rounded-lg flex flex-col gap-unit">
<div class="flex justify-between items-end">
<span class="font-label-xl text-on-surface">Daily Goal</span>
<span class="font-label-md text-primary font-bold">15 / 30 mins</span>
</div>
<div class="h-3 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-1/2 rounded-full"></div>
</div>
<p class="font-label-md text-on-surface-variant italic">Almost halfway there! Keep it up.</p>
</section>
<!-- Manual Entry & Details -->
<section class="grid grid-cols-1 gap-gutter">
<div class="bg-surface-container-lowest border border-outline-variant p-stack-md rounded-lg flex items-center justify-between group active:bg-surface-container-high transition-colors cursor-pointer">
<div class="flex items-center gap-stack-md">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-fixed" data-icon="edit_calendar">edit_calendar</span>
</div>
<div>
<h3 class="font-label-xl text-on-surface">Log Manually</h3>
<p class="font-label-md text-on-surface-variant">Add a missed session</p>
</div>
</div>
<span class="material-symbols-outlined text-outline" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Visual Context Image -->
<div class="relative h-48 rounded-lg overflow-hidden mt-stack-sm">
<img alt="Baby doing tummy time" class="w-full h-full object-cover" data-alt="A peaceful, high-key photograph of a happy infant lying on their stomach on a soft, sage-colored knitted blanket. The room is filled with bright, natural morning light, creating a nurturing and calm atmosphere. The baby is lifting their head slightly, showcasing a milestone moment. The overall aesthetic is minimalist, clean, and modern, perfectly reflecting a supportive parenting environment with soft focus backgrounds." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0dpU8fr9-pPv_Nc1jb1s1CZSEOikBwVpTSKBAKWLyv_aE7ahd58y0YzPJh5ZFV2H0aj8Iyll86MXlAJDekt-ofjkMxx4kOX3h9j_OLx5Hpvzsz1Guo_3REcUpssbXGgXWGMEyd9GkxM1VjZoXXu5PzuOqVJlXW1jisIk42z_ezjW0DZRKh97PB10kv2QOUr4bOMv5xMzwQH0U9cwTThiq7tV80VAGRlrcSyfzWgHDpNK-d51lQHuqI3n-dl26e_2wuAnARUKpuS3o"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
<div class="absolute bottom-4 left-4 text-on-primary">
<span class="font-label-md block opacity-90">Parenting Tip</span>
<span class="font-label-xl">Use toys to encourage lifting</span>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-[#FCF9F2]/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-[#6B8E6B]/10 dark:border-white/5 shadow-[0_-8px_32px_0_rgba(107,142,107,0.12)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 max-w-lg mx-auto left-1/2 -translate-x-1/2 rounded-t-[32px]">
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#6B8E6B] dark:hover:text-[#8BAB8B]">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium tracking-wide">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#6B8E6B] dark:hover:text-[#8BAB8B]">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium tracking-wide">History</span>
</button>
<!-- Active FAB Style Logic for Add -->
<button class="flex flex-col items-center justify-center text-[#6B8E6B] dark:text-[#8BAB8B] scale-110 transition-transform">
<span class="material-symbols-outlined text-[32px]" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium tracking-wide">Add</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#6B8E6B] dark:hover:text-[#8BAB8B]">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium tracking-wide">Insights</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#6B8E6B] dark:hover:text-[#8BAB8B]">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium tracking-wide">Settings</span>
</button>
</nav>
</body></html>
